version: "3.9"

services:
  api:
    build: .
    container_name: polygraph_api
    working_dir: /app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  ui:
    build: .
    container_name: polygraph_ui
    working_dir: /app
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - api